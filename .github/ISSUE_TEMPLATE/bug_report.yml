name: Bug report
description: Something doesn't work the way it should
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. **If this could let one agent reach another's
        memory, secrets, or skills — or bypass the destructive-action gate —
        please report it privately instead** via the Security tab, not here.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The smallest sequence of commands that reproduces it.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of `asterism --version`, or the commit you're on.
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Bun version (`bun --version`), and Node version if relevant.
