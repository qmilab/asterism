name: container image

# Builds the container image for linux/amd64 and linux/arm64. On a pull request or a
# push to main it only *builds* — proof the Dockerfile still produces a working image
# on both architectures. On a release tag (v*) it also publishes a multi-arch manifest
# to the GitHub Container Registry (ghcr.io/<owner>/asterism) using the built-in
# GITHUB_TOKEN, so no extra secret is needed.
#
# The arm64 build runs under QEMU emulation on the amd64 runner, so it is slower than
# the native amd64 build — the cost of one image that runs on Intel/AMD servers and on
# Apple Silicon / ARM hosts alike.

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'packages/**'
      - 'package.json'
      - 'tsconfig*.json'
      - 'bun.lock'
      - '.github/workflows/docker.yml'
  pull_request:
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'packages/**'
      - 'package.json'
      - 'tsconfig*.json'
      - 'bun.lock'
      - '.github/workflows/docker.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      # Register QEMU so the amd64 runner can build the linux/arm64 image too.
      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha

      # Only authenticate when we are actually going to push (a release tag).
      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on a release tag)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
