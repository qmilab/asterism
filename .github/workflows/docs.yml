name: docs

# Builds the MkDocs site and deploys it to GitHub Pages. The org Pages site
# (qmilab.github.io) uses the apex domain qmilab.com, so this project site is
# served at qmilab.com/asterism/ — and building into _site/docs lands the docs
# at qmilab.com/asterism/docs/. Do NOT set a custom domain (CNAME) on this
# repo's Pages, or it would override the inherited apex.
#
# This repo's Pages owns the whole /asterism/* path (a project site takes
# precedence over the org site for its prefix), so the landing page at
# /asterism/ must also ship from here: landing/. is copied into the artifact
# root (_site/) alongside _site/docs/.
#
# One-time setup: repo Settings -> Pages -> Source = "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'landing/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - run: pip install mkdocs-material
      - run: mkdocs build --site-dir _site/docs
      # Land the landing page at the /asterism/ root, next to /asterism/docs/.
      # README.md is a maintainer note, not a published asset — drop it.
      - run: |
          cp -r landing/. _site/
          rm -f _site/README.md
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
