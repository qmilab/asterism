<svg width="300" height="72" viewBox="0 0 300 72" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Asterism">
  <title>Asterism</title>
  <defs>
    <linearGradient id="as-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <!-- asterism: separate stars that form a pattern only from where you stand -->
  <g transform="translate(34,36)">
    <!-- faint lines tracing the pattern -->
    <path d="M-22,-13 L-3,-22 L13,-5 L1,15 L-18,9 Z"
          fill="none" stroke="url(#as-g)" stroke-width="1.1" stroke-linejoin="round" opacity="0.4"/>
    <!-- minor stars -->
    <g fill="url(#as-g)">
      <circle cx="-22" cy="-13" r="2"/>
      <circle cx="-3" cy="-22" r="2.3"/>
      <circle cx="1" cy="15" r="2"/>
      <circle cx="-18" cy="9" r="1.8"/>
    </g>
    <!-- focal star: a four-point sparkle with a bright center -->
    <path fill="url(#as-g)" d="M13,-12 L15,-7 L20,-5 L15,-3 L13,2 L11,-3 L6,-5 L11,-7 Z"/>
    <circle cx="13" cy="-5" r="1.5" fill="#ffffff" opacity="0.9"/>
  </g>
  <text x="72" y="49" font-family="'Segoe UI', system-ui, Helvetica, Arial, sans-serif"
        font-size="40" font-weight="600" letter-spacing="0.3" fill="url(#as-g)">Asterism</text>
</svg>
